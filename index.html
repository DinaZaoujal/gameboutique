<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Y2K Boutique</title>
  <link rel="icon" type="image/jpeg" href="assets/gameplay/tab.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiko:wght@400;600;700&family=Ancizar+Serif:ital,wght@0,300..900;1,300..900&family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Jua&family=Kalnia:wght@100..700&family=League+Spartan:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Ole&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">

  <!-- Start scherm -->
  <div class="start-screen" id="startScreen">
    <img src="assets/gameplay/logoroze.png" alt="Y2K Boutique" class="start-logo">
    <div class="pc-wrapper">
      <img src="assets/gameplay/pc.png" alt="pc" class="pc-img">
      <div class="pc-screen-text">
        <div class="start-sub">Verwelkom klanten, voer gesprekken en style ze met de perfecte outfit!</div>
        <button class="start-btn" onclick="startGame()">Winkel openen</button>
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div class="hud">
    <img src="assets/gameplay/logoroze.png" alt="Y2K Boutique" class="hud-logo">
    <div class="hud-right">
      <div class="badge badge-day">Dag <span id="dayNum">1</span></div>
      <div class="badge badge-coin"><img src="assets/gameplay/goldenstar.png" class="coin-star" alt="star"> <span id="coinNum">0</span></div>
      <button class="sound-btn" id="soundBtn" onclick="SFX.toggle()">&#128266;</button>
    </div>
  </div>

  <!-- Scene met karakter -->
  <div class="scene">
    <div class="scene-bg" id="sceneBg"></div>
    <div class="scene-deco"></div>
    <img id="charImg" class="char-img" src="" alt="klant">
    <div class="phase-tag" id="phaseTag">intro</div>
    <div class="feedback-pop" id="feedPop"></div>
  </div>

  <!-- Dialoog -->
  <div class="dialogue" id="dialogueBox">
    <div class="speaker" id="speakerName"></div>
    <div class="dtext" id="dText"></div>
    <div class="d-actions" id="dActions"></div>
  </div>

  <!-- Dag overzicht -->
  <div class="day-overview" id="dayOverview">
    <div class="day-ov-inner">
      <div class="day-ov-title">Dag <span id="ovDay">1</span> voorbij!</div>
      <div class="day-ov-stats">
        <div class="day-ov-stat">
          <img src="assets/gameplay/betaalmachine.png" class="day-ov-icon" alt="betaalmachine">
          <div class="day-ov-info">
            <div class="day-ov-label">Winst vandaag</div>
            <div class="day-ov-val" id="ovCoins">0 coins</div>
          </div>
        </div>
        <div class="day-ov-stat">
          <img src="assets/gameplay/goldenstar.png" class="day-ov-icon" alt="punten">
          <div class="day-ov-info">
            <div class="day-ov-label">Punten</div>
            <div class="day-ov-val" id="ovScore">0 / 9</div>
          </div>
        </div>
      </div>
      <button class="start-btn" onclick="continueToNextDay()">Volgende dag ></button>
    </div>
  </div>

  <!-- Garderobe -->
  <div class="wardrobe" id="wardrobePanel">
    <div class="wrd-top">
      <div class="wrd-col">
        <div class="wrd-label">Collectie</div>
        <div class="items-grid" id="itemsGrid"></div>
      </div>
      <div class="outfit-preview" id="outfitPreview">
        <div class="wrd-label">Jouw outfit</div>
        <div class="bag-drop-zone" id="bagDropZone">
          <img src="assets/gameplay/pinkshopppingcar.png" alt="Shopping bag" class="bag-img" id="bagImg">
          <div class="bag-items" id="bagItems"></div>
        </div>
      </div>
    </div>
    <div class="wrd-actions">
      <button class="d-btn pri" onclick="SFX.click(); submitOutfit()">Verkopen!</button>
      <button class="d-btn" onclick="SFX.click(); clearOutfit()">Wis alles</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
